<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Word Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Daily Word Test</p>
        <h1>매일 한 문제씩, 영어단어</h1>
        <p class="subtitle">
          테스트로 수준을 먼저 확인하고, TOEIC, 수능, GRE, NEWS 단어 학습으로
          이어갈 수 있습니다.
        </p>
      </header>

      <main class="app-card">
        <section class="category-panel">
          <button class="category-button active" data-category="test">테스트</button>
          <button class="category-button" data-category="toeic">TOEIC</button>
          <button class="category-button" data-category="csat">수능</button>
          <button class="category-button" data-category="gre">GRE</button>
          <button class="category-button" data-category="news">NEWS</button>
        </section>

        <section class="quiz-layout">
          <div class="word-panel">
            <p class="panel-label">오늘의 단어</p>
            <h2 id="word">Loading...</h2>
            <p id="pronunciation" class="pronunciation"></p>
            <p id="progress" class="progress hidden"></p>
            <p class="hint" id="hint">
              왼쪽 단어를 보고 오른쪽 영어 뜻 중 가장 알맞은 것을 고르세요.
            </p>

            <article id="news-card" class="news-card hidden">
              <p class="panel-label">기사 발췌</p>
              <h3 id="article-title" class="article-title"></h3>
              <p id="article-meta" class="article-meta"></p>
              <p id="news-context" class="news-context"></p>
              <a id="article-link" class="article-link" href="#" target="_blank" rel="noreferrer">
                원문 보기
              </a>
            </article>
          </div>

          <div class="options-panel">
            <p class="panel-label">정답 선택</p>
            <div id="options" class="options"></div>
            <div id="result" class="result" aria-live="polite"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
